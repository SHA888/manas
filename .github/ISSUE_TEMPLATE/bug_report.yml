name: Bug report
description: Report a reproducible problem in Manas
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so it can be reproduced.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands, input text, files, or workflow needed to reproduce the issue.
      placeholder: |
        1. Run `manas ...`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include logs/output if possible.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Manas version / commit
      placeholder: e.g. main, v0.7.1, or commit SHA

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, and relevant system details.
      placeholder: |
        OS:
        rustc --version:
        cargo --version:

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that may help debug the issue.
